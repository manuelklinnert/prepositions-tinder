<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Präpositionen Tinder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Progress bar -->
  <div id="progress-bar">
    <div id="progress-header">
      <span id="progress-text">0 / 20 gemeistert</span>
      <button id="btn-start-over">Starte neu</button>
    </div>
    <div id="progress-track">
      <div id="progress-fill"></div>
    </div>
  </div>

  <!-- Confirm reset modal -->
  <div id="modal-overlay">
    <div id="modal-box">
      <p>Möchtest du wirklich den Fortschritt auf 0 zurücksetzen?</p>
      <div id="modal-buttons">
        <button id="btn-modal-cancel">Abbrechen</button>
        <button id="btn-modal-confirm">Zurücksetzen</button>
      </div>
    </div>
  </div>

  <!-- Card view -->
  <div id="screen-cards" class="screen active">
    <div id="card-stack">
      <div id="result-popup"></div>
      <div id="card">
        <p id="card-sentence"></p>
        <div id="card-choices">
          <span id="choice-left" class="choice"></span>
          <span id="choice-right" class="choice"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Summary screen -->
  <div id="screen-summary" class="screen">
    <h2>Runde beendet!</h2>
    <p id="summary-text"></p>
    <button id="btn-restart">Weiter üben</button>
  </div>

  <!-- Congratulations screen -->
  <div id="screen-congrats" class="screen">
    <h2>Glückwunsch! 🎉</h2>
    <p>Du hast alle Präpositionen gemeistert!</p>
    <button id="btn-reset">Nochmal von vorne</button>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
